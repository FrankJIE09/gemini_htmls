<!DOCTYPE html>
<html lang="zh-CN">
<head>

            </div>
        </div>

        <p class="mt-6 text-xs text-slate-400">当月 = 本月自年初累计 − 上月自年初累计（仅同一年内相邻月）。数据由 shanghai_real_estate_fetch.py 拉取并计算后内嵌。</p>
